<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUANTRA — AI Global Markets Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
:root{
  --bg:#05090f;--s1:#080e18;--s2:#0c1422;--s3:#101a2e;--s4:#16233d;
  --border:#1a2640;--border2:#1f2f4a;--border3:#263856;
  --q:#6c63ff;--q2:#8b85ff;--qdim:rgba(108,99,255,.12);--qglow:rgba(108,99,255,.25);
  --teal:#00d4aa;--teal-dim:rgba(0,212,170,.1);
  --gold:#f5a623;--gold-dim:rgba(245,166,35,.1);
  --bull:#22c55e;--bull-dim:rgba(34,197,94,.12);
  --bear:#f43f5e;--bear-dim:rgba(244,63,94,.12);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.1);
  --text:#e2ecff;--text2:#7a93be;--text3:#3d5278;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:10px;--r2:14px;--r3:20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font)}
body{background:var(--bg);color:var(--text);overflow-x:hidden;font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}

.layer{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden;z-index:10}
.layer.active{display:flex}

#stars-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4}

/* AUTH UI */
#l-auth{align-items:center;justify-content:center;background:var(--bg);overflow-y:auto}
.auth-wrap{position:relative;z-index:1;width:100%;max-width:440px;padding:20px}
.auth-logo{text-align:center;margin-bottom:28px}
.logo-mark{display:inline-flex;align-items:center;gap:12px}
.logo-name{font-size:30px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,#6c63ff,#00d4aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-tag{font-size:10px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-top:3px}
.auth-card{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r3);padding:32px;box-shadow:0 40px 80px rgba(0,0,0,.6)}
.auth-tabs{display:flex;background:var(--s2);border-radius:var(--r);padding:3px;margin-bottom:22px;gap:2px}
.auth-tab{flex:1;padding:9px;text-align:center;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;color:var(--text2);transition:all .2s}
.auth-tab.a{background:var(--s4);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.frow{margin-bottom:14px}
.flbl{font-size:10px;color:var(--text2);font-weight:600;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.finp{width:100%;background:var(--s2);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:13px;padding:10px 13px;border-radius:var(--r);outline:none;transition:border-color .2s}
.finp:focus{border-color:var(--q)}
.auth-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--q),#4f46e5);border:none;border-radius:var(--r);color:#fff;font-family:var(--font);font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;margin-top:4px}
.auth-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 24px var(--qglow)}
.auth-note{text-align:center;margin-top:16px;font-size:11px;color:var(--text3)}
.auth-note a{color:var(--q2);cursor:pointer;text-decoration:none}
.err{background:var(--bear-dim);border:1px solid rgba(244,63,94,.3);color:#f87171;border-radius:var(--r);padding:9px 12px;font-size:12px;margin-bottom:12px;display:none}
.err.show{display:block}

/* DASHBOARD UI */
#l-dash{display:flex;flex-direction:column;background:var(--bg)}
.d-header{height:50px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;justify-content:space-between}
.d-logo-name{font-size:18px;font-weight:900;letter-spacing:1px;background:linear-gradient(135deg,var(--q),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.chart-container{flex:1;position:relative;width:100%;height:100%}
#tv_chart{width:100%;height:100%}
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="layer active" id="l-auth">
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="logo-mark">
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
          <polygon points="22,2 40,12 40,32 22,42 4,32 4,12" stroke="#6c63ff" stroke-width="1.5" fill="rgba(108,99,255,.08)"/>
          <polyline points="10,28 17,20 22,24 32,14" stroke="#00d4aa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="32" cy="14" r="2.5" fill="#00d4aa"/>
        </svg>
        <div>
          <div class="logo-name">QUANTRA</div>
          <div class="logo-tag">AI Global Markets Intelligence</div>
        </div>
      </div>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab a" onclick="authTab('login')">Sign In</div>
        <div class="auth-tab" onclick="authTab('signup')">Create Account</div>
      </div>
      <div id="auth-err" class="err"></div>
      
      <div id="form-login">
        <div class="frow">
          <div class="flbl">Email Address</div>
          <input class="finp" id="l-email" type="email" placeholder="you@example.com">
        </div>
        <div class="frow">
          <div class="flbl">Password</div>
          <input class="finp" id="l-pass" type="password" placeholder="••••••••">
        </div>
        <button class="auth-btn" onclick="doLogin()">Sign In to QUANTRA</button>
        <div class="auth-note">Don't have an account? <a onclick="authTab('signup')">Sign up free</a></div>
      </div>

      <div id="form-signup" style="display:none">
        <div class="frow">
          <div class="flbl">Full Name</div>
          <input class="finp" id="s-name" placeholder="John Doe">
        </div>
        <div class="frow">
          <div class="flbl">Email Address</div>
          <input class="finp" id="s-email" type="email" placeholder="you@example.com">
        </div>
        <button class="auth-btn" onclick="doLogin()">Create Account</button>
        <div class="auth-note">Already have an account? <a onclick="authTab('login')">Sign In</a></div>
      </div>
    </div>
  </div>
</div>

<div class="layer" id="l-dash">
  <header class="d-header">
    <div class="d-logo-name">QUANTRA PRO</div>
    <button onclick="location.reload()" style="background:none; border:1px solid var(--border); color:var(--text2); padding:5px 10px; border-radius:4px; cursor:pointer">Logout</button>
  </header>
  <div class="chart-container">
    <div id="tv_chart"></div>
  </div>
</div>

<script>
// 1. Tab Switching Logic
function authTab(type) {
  const login = document.getElementById('form-login');
  const signup = document.getElementById('form-signup');
  const tabs = document.querySelectorAll('.auth-tab');
  
  tabs.forEach(t => t.classList.remove('a'));
  
  if(type === 'login') {
    login.style.display = 'block';
    signup.style.display = 'none';
    tabs[0].classList.add('a');
  } else {
    login.style.display = 'none';
    signup.style.display = 'block';
    tabs[1].classList.add('a');
  }
}

// 2. Authentication Mockup
function doLogin() {
  const emailInput = document.getElementById('l-email').value || document.getElementById('s-email').value;
  
  if(emailInput.includes('@')) {
    document.getElementById('l-auth').classList.remove('active');
    document.getElementById('l-dash').classList.add('active');
    initTradingView();
  } else {
    const err = document.getElementById('auth-err');
    err.textContent = "Please enter a valid email address.";
    err.classList.add('show');
  }
}

// 3. TradingView Widget Initialization
function initTradingView() {
  new TradingView.widget({
    "autosize": true,
    "symbol": "NASDAQ:AAPL",
    "interval": "D",
    "timezone": "Etc/UTC",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "toolbar_bg": "#f1f3f6",
    "enable_publishing": false,
    "allow_symbol_change": true,
    "container_id": "tv_chart"
  });
}

// 4. Background Canvas Animation
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);
resize();

for(let i=0; i<150; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 1.5,
    speed: Math.random() * 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#ffffff";
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
    s.y -= s.speed;
    if(s.y < 0) s.y = canvas.height;
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
